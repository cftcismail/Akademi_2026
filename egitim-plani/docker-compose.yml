services:
  egitim-plani:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped